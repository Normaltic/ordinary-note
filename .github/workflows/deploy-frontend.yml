name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'packages/web/**'
      - 'packages/shared/**'

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo lint typecheck test --filter=@ordinary-note/web

      - run: pnpm turbo build --filter=@ordinary-note/web
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_WS_URL: ${{ vars.VITE_WS_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      # Hashed assets: long cache
      - run: |
          aws s3 sync packages/web/dist/ s3://${{ vars.S3_FRONTEND_BUCKET }}/ \
            --delete \
            --exclude "*" \
            --include "assets/*" \
            --cache-control "public, max-age=31536000, immutable"

      # HTML and root files: no cache
      - run: |
          aws s3 sync packages/web/dist/ s3://${{ vars.S3_FRONTEND_BUCKET }}/ \
            --delete \
            --exclude "assets/*" \
            --cache-control "no-cache, no-store, must-revalidate"

      - run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
