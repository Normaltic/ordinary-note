upstream ordinary_note_api {
    server 127.0.0.1:3001;
}

server {
    listen 80;
    server_name ordinary-note-api.yunji.kim;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ordinary-note-api.yunji.kim;

    ssl_certificate /etc/letsencrypt/live/ordinary-note-api.yunji.kim/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ordinary-note-api.yunji.kim/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # API proxy
    location /api/ {
        proxy_pass http://ordinary_note_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket proxy for collaboration
    location /collaboration {
        proxy_pass http://ordinary_note_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Origin $http_origin;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
